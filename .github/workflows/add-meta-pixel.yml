name: Add Meta Pixel

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inject-meta-pixel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Inject Meta Pixel into all HTML files
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          PIXEL_ID = "1789508675795500"

          head_script = f'''<!-- Meta Pixel Code -->
<script>
!function(f,b,e,v,n,t,s)
{{if(f.fbq)return;n=f.fbq=function(){{n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)}};
if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];t=b.createElement(e);t.async=!0;
t.src=v;s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)}}(window, document,'script',
'https://connect.facebook.net/en_US/fbevents.js');
fbq('init', '{PIXEL_ID}');
fbq('track', 'PageView');
</script>
<!-- End Meta Pixel Code -->'''

          noscript = f'''<noscript><img height="1" width="1" style="display:none"
src="https://www.facebook.com/tr?id={PIXEL_ID}&ev=PageView&noscript=1"
/></noscript>'''

          changed = []
          for path in Path('.').rglob('*.html'):
              if '.git' in path.parts:
                  continue

              text = path.read_text(encoding='utf-8')
              original = text

              if f"fbq('init', '{PIXEL_ID}')" not in text:
                  if '</head>' in text:
                      text = text.replace('</head>', head_script + '\n</head>', 1)
                  elif '</HEAD>' in text:
                      text = text.replace('</HEAD>', head_script + '\n</HEAD>', 1)
                  else:
                      text = head_script + '\n' + text

              if f'tr?id={PIXEL_ID}' not in text:
                  text = re.sub(r'(<body\b[^>]*>)', r'\1\n' + noscript, text, count=1, flags=re.IGNORECASE)

              if text != original:
                  path.write_text(text, encoding='utf-8')
                  changed.append(str(path))

          print('Updated files:', ', '.join(changed) if changed else 'none')
          PY

      - name: Commit Meta Pixel changes
        run: |
          if git diff --quiet; then
            echo "Meta Pixel already installed. No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Add Meta Pixel tracking"
          git push
